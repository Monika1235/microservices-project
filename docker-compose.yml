version: "3.0"
services:
 user-service:
  build: ./user-service
  container_name: user-service
  expose:
    - "8080"
  depends_on: 
    - mongo
  networks: [spring_mongo_net]
 
 task-service:
  build: ./task-service
  container_name: task-service
  expose:
    - "8080"
  depends_on:
    - mongo
    - user-service
  networks: [spring_mongo_net]
  
 file-service:
  build: ./file-service
  container_name: file-service
  expose:
    - "8080"
  environment:
  networks: [spring_mongo_net]
 
 notification-service:
  build: ./notification-service
  container_name: notification-service
  expose:
    - "8080"
  networks:
    - spring_mongo_net

 mongo:
  image: mongo
  container_name: mongo
  ports:
    - "27017:27017"
  networks: [spring_mongo_net]

 gateway:
  image: nginx:latest
  container_name: api-gateway
  ports:
    - "80:80"
  volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
  depends_on:
    - user-service
    - task-service
    - file-service
    - notification-service
  networks:
    - spring_mongo_net

networks:
 spring_mongo_net:
